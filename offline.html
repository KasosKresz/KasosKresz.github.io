<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline | MindEase</title>
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#2f5d62">
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #eef7f4, #f7fbfa, #edf4fb);
      color: #2f3a3a;
    }

    .card {
      max-width: 520px;
      background: white;
      border-radius: 22px;
      padding: 32px 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      color: #2f5d62;
      margin: 0 0 12px;
    }

    p {
      line-height: 1.7;
      margin: 0 0 14px;
    }

    a {
      display: inline-block;
      margin-top: 8px;
      text-decoration: none;
      background: #2f5d62;
      color: white;
      padding: 11px 16px;
      border-radius: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>You are offline</h1>
    <p>MindEase can still open pages you have visited recently, but private tools like the journal, mood tracker, and Priority Matrix still need an internet connection.</p>
    <p>Reconnect and try again for the latest content and account data.</p>
    <a href="/index.html">Return to Home</a>
  </main>
</body>
</html>
