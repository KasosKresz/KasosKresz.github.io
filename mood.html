<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mood Check | MindEase</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #dbeafe, #e0f2fe, #f0fdf4);
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: white;
      padding: 36px 28px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
    }

    h1 {
      text-align: center;
      color: #1e3a8a;
      margin-bottom: 10px;
      font-size: 30px;
    }

    .subtitle {
      text-align: center;
      color: #475569;
      margin-bottom: 26px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .mood-row {
      padding: 14px;
      border: 1px solid #dbe3ea;
      border-radius: 14px;
      background: #f8fafc;
    }

    .mood-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-weight: bold;
      color: #334155;
    }

    input[type="range"] {
      width: 100%;
    }

    button {
      margin-top: 8px;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    #message {
      margin-top: 14px;
      min-height: 20px;
      text-align: center;
      color: #dc2626;
    }

    .success {
      color: #059669 !important;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Mood Check-in</h1>
    <p class="subtitle">Move any sliders that match how you feel</p>

    <form id="moodForm">
      <div class="mood-row">
        <div class="mood-top">
          <span>Happy</span>
          <span id="happyValue">0</span>
        </div>
        <input type="range" id="happy" min="0" max="10" value="0" />
      </div>

      <div class="mood-row">
        <div class="mood-top">
          <span>Calm</span>
          <span id="calmValue">0</span>
        </div>
        <input type="range" id="calm" min="0" max="10" value="0" />
      </div>

      <div class="mood-row">
        <div class="mood-top">
          <span>Anxious</span>
          <span id="anxiousValue">0</span>
        </div>
        <input type="range" id="anxious" min="0" max="10" value="0" />
      </div>

      <div class="mood-row">
        <div class="mood-top">
          <span>Stressed</span>
          <span id="stressedValue">0</span>
        </div>
        <input type="range" id="stressed" min="0" max="10" value="0" />
      </div>

      <div class="mood-row">
        <div class="mood-top">
          <span>Sad</span>
          <span id="sadValue">0</span>
        </div>
        <input type="range" id="sad" min="0" max="10" value="0" />
      </div>

      <button type="submit">Save Mood</button>
      <p id="message"></p>
    </form>
  </div>

  <script type="module">
    import { db, auth } from "./firebase-config.js";
    import { addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
      } else {
        window.location.href = "/login.html";
      }
    });

    const moods = ["happy", "calm", "anxious", "stressed", "sad"];
    const form = document.getElementById("moodForm");
    const message = document.getElementById("message");

    moods.forEach((mood) => {
      const slider = document.getElementById(mood);
      const value = document.getElementById(mood + "Value");

      slider.addEventListener("input", () => {
        value.textContent = slider.value;
      });
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const selectedMoods = {};

      moods.forEach((mood) => {
        const intensity = Number(document.getElementById(mood).value);
        if (intensity > 0) {
          selectedMoods[mood] = intensity;
        }
      });

      if (Object.keys(selectedMoods).length === 0) {
        message.className = "";
        message.textContent = "Please move at least one slider before saving.";
        return;
      }

      try {
        await addDoc(collection(db, "mood_entries"), {
          moods: selectedMoods,
          user: currentUser.uid,
          time: new Date()
        });

        message.className = "success";
        message.textContent = "Mood saved";

        moods.forEach((mood) => {
          document.getElementById(mood).value = 0;
          document.getElementById(mood + "Value").textContent = 0;
        });
      } catch (error) {
        message.className = "";
        message.textContent = error.message;
      }
    });
  </script>
</body>
</html>
