<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | MindEase</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    .home-link {
      display: inline-block;
      margin-bottom: 18px;
      color: #2f5d62;
      text-decoration: none;
      font-weight: bold;
    }

    .home-link:hover {
      text-decoration: underline;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #dbeafe, #e0f2fe, #f0fdf4);
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #1e3a8a;
    }

    .subtitle {
      color: #475569;
      margin-bottom: 28px;
      font-size: 16px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    input {
      padding: 14px 16px;
      font-size: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      outline: none;
    }

    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      color: #475569;
      font-size: 14px;
    }

    .checkbox-row input {
      width: auto;
      padding: 0;
      margin: 0;
      box-shadow: none;
    }

    button {
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    #message {
      margin-top: 18px;
      color: #dc2626;
      min-height: 20px;
    }

    .bottom-link {
      margin-top: 22px;
      font-size: 15px;
      color: #475569;
    }

    .bottom-link a {
      color: #2563eb;
      text-decoration: none;
      font-weight: bold;
    }

    .bottom-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <a href="/index.html" class="home-link">&larr; Back to Home</a>
    <h1>Welcome Back</h1>
    <p class="subtitle">Log in to your MindEase account</p>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <label class="checkbox-row" for="rememberMe">
        <input type="checkbox" id="rememberMe" checked />
        Stay signed in on this device
      </label>
      <button type="submit">Log in</button>
    </form>

    <p id="message"></p>

    <p class="bottom-link">
      Don't have an account? <a href="/signup.html">Sign up</a>
    </p>
  </div>

  <script type="module">
    import { auth } from "./firebase-config.js";
    import {
      browserLocalPersistence,
      browserSessionPersistence,
      setPersistence,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");

    function getLoginMessage(error) {
      switch (error.code) {
        case "auth/invalid-credential":
        case "auth/wrong-password":
        case "auth/user-not-found":
          return "That email and password do not match our records.";
        case "auth/invalid-email":
          return "Please enter a valid email address.";
        case "auth/too-many-requests":
          return "Too many attempts. Please try again in a moment.";
        default:
          return "We could not log you in right now. Please try again.";
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const rememberMe = document.getElementById("rememberMe").checked;

      try {
        message.textContent = "";
        await setPersistence(
          auth,
          rememberMe ? browserLocalPersistence : browserSessionPersistence
        );

        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "/index.html";
      } catch (error) {
        message.textContent = getLoginMessage(error);
      }
    });
  </script>
</body>
</html>
